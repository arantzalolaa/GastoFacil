  <!-- ========================================== -->
  <!-- 🧠 Detectar modo PWA / App instalada       -->
  <!-- ========================================== -->
  <script>
    (function () {
      function setDisplayModeClass() {
        var isStandalone =
          window.matchMedia('(display-mode: standalone)').matches ||
          window.matchMedia('(display-mode: fullscreen)').matches ||
          window.navigator.standalone === true;

        if (isStandalone) {
          document.documentElement.classList.add('pwa-standalone');
        } else {
          document.documentElement.classList.remove('pwa-standalone');
        }
      }

      setDisplayModeClass();

      if (window.matchMedia) {
        var standaloneQuery = window.matchMedia('(display-mode: standalone)');
        var fullscreenQuery = window.matchMedia('(display-mode: fullscreen)');

        if (standaloneQuery.addEventListener) {
          standaloneQuery.addEventListener('change', setDisplayModeClass);
          fullscreenQuery.addEventListener('change', setDisplayModeClass);
        } else if (standaloneQuery.addListener) {
          standaloneQuery.addListener(setDisplayModeClass);
          fullscreenQuery.addListener(setDisplayModeClass);
        }
      }
    })();
  </script>
