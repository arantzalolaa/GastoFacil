<ion-header class="app-header ion-no-border" *ngIf="!ocultarHeaderGlobal">
  <ion-toolbar>
    <div class="brand" slot="start">
      <ion-button
        class="profile-icon-button"
        fill="clear"
        aria-label="Abrir perfil"
        (click)="alternarPerfil()"
      >
        <ion-icon name="person-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>

      <span>Gasto Fácil</span>
    </div>

    <ion-buttons class="header-actions" slot="end">
      <ion-button
        class="header-icon-button"
        aria-label="Notificaciones"
        fill="clear"
      >
        <ion-icon name="notifications-outline" slot="icon-only"></ion-icon>
      </ion-button>

      <ion-button
        class="header-icon-button"
        aria-label="Cerrar sesión"
        fill="clear"
        (click)="confirmarCerrarSesion()"
      >
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <div class="profile-menu" *ngIf="mostrarPerfil">
    <div class="profile-avatar">
      <ion-icon name="person-circle-outline" aria-hidden="true"></ion-icon>
    </div>

    <div class="profile-info">
      <strong>{{ nombreUsuario || 'Usuario' }}</strong>
      <span>{{ correoUsuario || 'Correo no disponible' }}</span>
    </div>
  </div>
</ion-header>

<ion-tabs>
  <ion-tab-bar class="main-tab-bar" slot="bottom">
    <ion-tab-button tab="inicio" href="/inicio">
      <ion-icon aria-hidden="true" name="home"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="gastos" href="/gastos">
      <ion-icon aria-hidden="true" name="wallet"></ion-icon>
      <ion-label>Gastos</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="escanear" href="/escanear">
      <ion-icon aria-hidden="true" name="qr-code"></ion-icon>
      <ion-label>Escanear</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="resumen" href="/resumen">
      <ion-icon aria-hidden="true" name="bar-chart"></ion-icon>
      <ion-label>Resumen</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
