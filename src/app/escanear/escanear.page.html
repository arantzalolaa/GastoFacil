<ion-content class="scan-content app-content" [fullscreen]="false">
  <section class="scan-wrapper app-page-wrapper">

    <article class="camera-container">
      
      <video 
        #videoElement 
        class="camera-feed" 
        autoplay 
        playsinline 
        muted 
        [hidden]="capturaReciente">
      </video>

      <img 
        *ngIf="capturaReciente" 
        [src]="imagenRuta" 
        class="camera-feed" 
        alt="Foto capturada">

      <div class="scan-frame" *ngIf="!capturaReciente">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="scan-line"></div>
      </div>

      <div class="scan-hint" *ngIf="!capturaReciente">
        Alinea el ticket con el recuadro
      </div>
    </article>

    <div class="camera-actions">
      <button class="btn-take-photo" (click)="tomarFoto()" [disabled]="capturaReciente">
        <ion-icon name="camera" aria-hidden="true"></ion-icon>
        Tomar foto
      </button>

      <button class="btn-gallery" (click)="abrirGaleria()">
        <ion-icon name="image" aria-hidden="true"></ion-icon>
        Galería
      </button>
    </div>

    <canvas #canvasElement style="display: none;"></canvas>
    <input 
      #fileInput 
      type="file" 
      accept="image/*" 
      style="display: none;" 
      (change)="cargarDesdeGaleria($event)">

    <article class="recent-capture" *ngIf="capturaReciente">
      <div class="capture-thumb">
        <img [src]="imagenRuta" alt="Miniatura del ticket" />
      </div>

      <div class="capture-info">
        <strong>Captura reciente</strong>
        <span>{{ nombreCaptura }}</span>
      </div>

      <button class="btn-delete" (click)="eliminarCaptura()" aria-label="Eliminar captura">
        <ion-icon name="trash" aria-hidden="true"></ion-icon>
      </button>
    </article>

    <button class="btn-ai" (click)="analizarConIA()" [disabled]="!capturaReciente">
      <ion-icon name="sparkles" class="ai-icon" aria-hidden="true"></ion-icon>
      Analizar con IA
    </button>

    <p class="scan-footer-text">
      Nuestra IA detectará automáticamente montos, fechas y categorías para ti.
    </p>

  </section>
</ion-content>
