<ion-content class="expenses-content app-content" [fullscreen]="false">
  <section class="expenses-wrapper app-page-wrapper">
    <h1 class="page-title">Mis gastos</h1>

    <ion-searchbar
      class="expenses-search"
      [(ngModel)]="terminoBusqueda"
      placeholder="¿En qué gastaste hoy?"
      search-icon="search"
      show-clear-button="focus"
    ></ion-searchbar>

    <div class="filters-row" aria-label="Filtros de gastos">
      <button
        type="button"
        class="filter-pill"
        [class.filter-pill--active]="categoriaSeleccionada === 'Fecha'"
        (click)="seleccionarFiltro('Fecha')"
      >
        <ion-icon name="calendar-outline" aria-hidden="true"></ion-icon>
        <span>Fecha</span>
      </button>

      <div class="filter-separator"></div>

      <button
        type="button"
        class="filter-pill"
        [class.filter-pill--active]="categoriaSeleccionada === 'Todos'"
        (click)="seleccionarFiltro('Todos')"
      >
        <span>Todos</span>
      </button>

      <button
        type="button"
        class="filter-pill"
        *ngFor="let cat of categoriasOrdenadas"
        [class.filter-pill--active]="categoriaSeleccionada === cat.etiqueta"
        (click)="seleccionarFiltro(cat.etiqueta)"
      >
        <span>{{ cat.etiqueta }}</span>
      </button>
    </div>

    <div class="date-filter-panel" *ngIf="mostrarFiltroFecha">
      <label>
        <span>Desde</span>
        <input type="date" [(ngModel)]="fechaDesde" />
      </label>
      <label>
        <span>Hasta</span>
        <input type="date" [(ngModel)]="fechaHasta" />
      </label>
      <button type="button" class="btn-clear" (click)="limpiarFiltroFecha()">Limpiar</button>
    </div>

    <div class="expenses-list">
      <article class="expense-card" *ngFor="let gasto of gastosFiltrados">
        
        <div class="expense-icon" [ngClass]="iconBackgroundClass(gasto.categoria)">
          <ion-icon [name]="gasto.icono" aria-hidden="true"></ion-icon>
        </div>

        <div class="expense-content">
          <div class="expense-top">
            <h2 class="expense-title">{{ gasto.concepto }}</h2>
            <strong class="expense-amount">{{ gasto.monto | currency: 'USD' : 'symbol' : '1.2-2' }}</strong>
          </div>
          
          <div class="expense-bottom">
            <span class="category-tag" [ngClass]="tagClass(gasto.categoria)">{{ gasto.categoriaFormateada }}</span>
            <span class="expense-date">{{ gasto.fechaCorta }}</span>
          </div>
        </div>

      </article>
    </div>

    <div class="end-of-list">
      <img src="assets/gastos.jpg" alt="No encuentras lo que buscas" class="end-image" />
      <p>¿No encuentras lo que buscas?</p>
      <a href="#">Revisar otros meses</a>
    </div>

  </section>

  <ion-fab class="app-expense-fab" slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button routerLink="/nuevo-gasto" aria-label="Agregar gasto">
      <ion-icon name="add" aria-hidden="true"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
